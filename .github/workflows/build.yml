name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
          - os: windows-latest
            goos: windows
            goarch: arm64
            ext: .exe
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      # --- Platform-specific dependencies ---

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install macOS dependencies
        if: matrix.goos == 'darwin'
        run: brew install create-dmg

      # --- Fix wails.json npm command on Windows ---

      - name: Fix wails.json npm command (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          (Get-Content wails.json) `
            -replace 'npm\.cmd', 'npm' |
          Set-Content wails.json

      # --- Build ---

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate Wails bindings
        run: wails generate module

      - name: Build application (Windows/Linux)
        if: matrix.goos != 'darwin'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: >
          wails build -clean
          -platform ${{ matrix.goos }}/${{ matrix.goarch }}
          -o dns-selector-gui-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

      - name: Build application (macOS)
        if: matrix.goos == 'darwin'
        run: |
          cd frontend
          npm run build
          cd ..

          OUTPUT="build/bin/dns-selector-gui-${{ github.ref_name }}-darwin-${{ matrix.goarch }}"

          if [ "${{ matrix.goarch }}" = "amd64" ]; then
            GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 \
            CGO_CFLAGS='-arch x86_64' \
            CGO_LDFLAGS='-arch x86_64 -framework UniformTypeIdentifiers' \
            go build -buildvcs=false \
              -tags "desktop,wv2runtime.download,production" \
              -ldflags "-w -s -extldflags '-arch x86_64 -framework UniformTypeIdentifiers'" \
              -o "$OUTPUT" .
          else
            GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 \
            go build -buildvcs=false \
              -tags "desktop,wv2runtime.download,production" \
              -ldflags "-w -s -extldflags '-framework UniformTypeIdentifiers'" \
              -o "$OUTPUT" .
          fi

      # --- macOS DMG packaging ---

      - name: Package macOS DMG
        if: matrix.goos == 'darwin'
        run: |
          APP_PATH="build/bin/dns-selector-gui-${{ github.ref_name }}-darwin-${{ matrix.goarch }}.app"
          DMG_PATH="build/bin/dns-selector-gui-${{ github.ref_name }}-darwin-${{ matrix.goarch }}.dmg"
          BINARY="build/bin/dns-selector-gui-${{ github.ref_name }}-darwin-${{ matrix.goarch }}"

          rm -rf "$APP_PATH"
          mkdir -p "$APP_PATH/Contents/MacOS" "$APP_PATH/Contents/Resources"
          cp "$BINARY" "$APP_PATH/Contents/MacOS/dns-selector-gui"
          cp assets/icons.icns "$APP_PATH/Contents/Resources/iconfile.icns"

          cat > "$APP_PATH/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>dns-selector-gui</string>
          <key>CFBundleIdentifier</key><string>com.betterlmy.dns-selector-gui</string>
          <key>CFBundleName</key><string>DNS Selector</string>
          <key>CFBundleIconFile</key><string>iconfile</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleVersion</key><string>${{ github.ref_name }}</string>
          <key>CFBundleShortVersionString</key><string>${{ github.ref_name }}</string>
          </dict></plist>
          EOF

          create-dmg \
            --volname "DNS Selector GUI" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 425 178 \
            "$DMG_PATH" \
            "$APP_PATH" || true

          # create-dmg returns non-zero even on success sometimes; verify file exists
          if [ ! -f "$DMG_PATH" ]; then
            echo "::error::DMG creation failed"
            exit 1
          fi

      # --- Upload artifacts ---

      - name: Upload build artifact (Windows/Linux)
        if: matrix.goos != 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: dns-selector-gui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/dns-selector-gui-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

      - name: Upload build artifact (macOS DMG)
        if: matrix.goos == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: dns-selector-gui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/dns-selector-gui-${{ github.ref_name }}-darwin-${{ matrix.goarch }}.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create GitHub Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            ## DNS Selector GUI ${{ github.ref_name }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Windows | x64 (amd64) | `dns-selector-gui-${{ github.ref_name }}-windows-amd64.exe` |
            | Windows | ARM64 | `dns-selector-gui-${{ github.ref_name }}-windows-arm64.exe` |
            | macOS | Intel (amd64) | `dns-selector-gui-${{ github.ref_name }}-darwin-amd64.dmg` |
            | macOS | Apple Silicon (arm64) | `dns-selector-gui-${{ github.ref_name }}-darwin-arm64.dmg` |
            | Linux | x64 (amd64) | `dns-selector-gui-${{ github.ref_name }}-linux-amd64` |

            ### System Requirements

            **Windows**
            - Windows 10 1903+ / Windows 11
            - WebView2 runtime (built-in on Windows 10/11)

            **macOS**
            - macOS 11 (Big Sur) or later
            - Open the DMG and drag the app to Applications

            **Linux**
            - GTK 3 and WebKit2GTK 4.0 required
            - Ubuntu/Debian: `sudo apt install libgtk-3-0 libwebkit2gtk-4.0-37`
            - Fedora: `sudo dnf install gtk3 webkit2gtk4.0`
