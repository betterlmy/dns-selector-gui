name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1

      # GitHub Actions Windows runner 上 npm 在 PATH 里，直接用 npm
      # 临时把 wails.json 里的 npm.cmd 替换为 npm
      - name: 修正 wails.json npm 命令
        shell: pwsh
        run: |
          (Get-Content wails.json) `
            -replace 'npm\.cmd', 'npm' |
          Set-Content wails.json

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: 构建应用
        run: wails build -clean -o dns-selector-gui-${{ github.ref_name }}.exe

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dns-selector-gui-${{ github.ref_name }}
          path: build/bin/dns-selector-gui-${{ github.ref_name }}.exe
          if-no-files-found: error

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/dns-selector-gui-${{ github.ref_name }}.exe
          generate_release_notes: true
